  obstacles.forEach(o=>{ if(o.mstate!=='gone') drawMonster(o); });
  drawR();
  drawLasers();
  drawExplosions();
  drawTransition();

  sparks.forEach(s=>{
    ctx.save(); ctx.globalAlpha=s.life;
    ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(s.x,s.y,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.3; s.life-=0.04;
  });
  sparks=sparks.filter(s=>s.life>0);
  if(celebFrames>0) celebFrames--;
  if(shootFrames>0) shootFrames--;

  if(paused){
    ctx.fillStyle="rgba(0,0,20,.38)";
    ctx.fillRect(0,0,W,GY*.55);
  }
  updateHUD();
}
const LOCAL_SCORE_KEY = "crystalPlanetPhonicsRunnerBestV1";

function getLocalBestScore(){
  return Number(localStorage.getItem(LOCAL_SCORE_KEY) || 0);
}

function setGameMode(mode){
  gameMode = mode === "practice" ? "practice" : "diagnostic";
  configureQuestionSet();
  const diagBtn = document.getElementById("diagnosticModeBtn");
  const practiceBtn = document.getElementById("practiceModeBtn");
  if (diagBtn) diagBtn.classList.toggle("active", gameMode === "diagnostic");
  if (practiceBtn) practiceBtn.classList.toggle("active", gameMode === "practice");
}

function setRunnerExitButtonsDisabled(disabled){
  ["saveQuitBtn","runnerStayBtn","runnerSaveHomeBtn"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = !!disabled;
  });
}

function closeRunnerExitModal(){
  const modal = document.getElementById("runnerExitModal");
  if (!modal) return;
  runnerExitAction = null;
  modal.classList.remove("show");
  modal.setAttribute("aria-hidden", "true");
}

function openRunnerExitModal(mode = "home"){
  if (runExitInProgress) return;
  const modal = document.getElementById("runnerExitModal");
  const title = document.getElementById("runnerExitTitle");
  const text = document.getElementById("runnerExitText");
  const confirmBtn = document.getElementById("runnerSaveHomeBtn");
  if (!modal) return;
  if (mode === "quit") {
    runnerExitAction = endGame;
    if (title) title.textContent = "Save & Quit?";
    if (text) text.textContent = "Are you sure you want to end the game and save your score?";
    if (confirmBtn) confirmBtn.textContent = "Save & Quit";
  } else {
    runnerExitAction = saveAndGoHome;
    if (title) title.textContent = "End Run?";
    if (text) text.textContent = "Do you want to end the game and save your score?";
    if (confirmBtn) confirmBtn.textContent = "Save & Go Home";
  }
  modal.classList.add("show");
  modal.setAttribute("aria-hidden", "false");
}

function stopRunnerLoopAndAudio(){
  const bgmPrincess = document.getElementById('bgmPrincess');
  if (bgmPrincess) bgmPrincess.pause();
  cancelAnimationFrame(rafId);
}

async function submitRunnerScore(){
  const finalScore = Math.round(score * getRunnerScoreMultiplier());
  const lvl = gameMode === "practice" ? "Crystal Planet Practice" : "Crystal Planet";
  const oldBest = getLocalBestScore();
  const best = Math.max(finalScore, oldBest);
  const isNew = finalScore > oldBest;
  localStorage.setItem(LOCAL_SCORE_KEY, String(best));
  return { finalScore, lvl, best, isNew, rank: "Local Prototype" };
}

function renderRunnerGameOver(summary){
  document.getElementById("finalTitle").textContent = demoCompleted ? "GOOD JOB!" : "RUN ENDED";
  document.getElementById("finalScore").textContent = `${WORDS.length}/${WORDS.length}`;
  document.getElementById("finalLevels").textContent = summary.lvl;
  document.getElementById("finalBest").textContent = gameMode === "diagnostic" ? "Diagnostic" : "Practice";
  document.getElementById("finalRank").textContent = summary.rank;
  const wordsEl = document.getElementById("finalWords");
  if (wordsEl) {
    wordsEl.innerHTML = "";
    coveredWords.forEach(word => {
      const chip = document.createElement("span");
      chip.className = "word-chip";
      chip.textContent = word;
      wordsEl.appendChild(chip);
    });
  }
  const nb=document.getElementById("nbadge");
  if (nb) nb.style.display="none";
}

async function saveAndGoHome(){
  if (runExitInProgress) return;
  runExitInProgress = true;
  setRunnerExitButtonsDisabled(true);
  closeRunnerExitModal();
  stopRunnerLoopAndAudio();
  saveRunnerDiagnosticSession();
  const summary = await submitRunnerScore();
  showScreen("gameOverScreen");
  demoCompleted = false;
  renderRunnerGameOver(summary);
}

async function confirmRunnerExit(){
  if (runExitInProgress || typeof runnerExitAction !== "function") return;
  const action = runnerExitAction;
  runnerExitAction = null;
  await action();
}

// START / END
function startGame(){
  try{getAC().resume();}catch(e){}
  runExitInProgress = false;
  setRunnerExitButtonsDisabled(false);
  closeRunnerExitModal();
  score=0;hearts=0;skipCount=0;speed=3.5;frameN=0;
  paused=false;qPending=false;obstacles=[];nextIn=130;stumble=0;
  bgOff=0;sparks=[];celebFrames=0;laser=null;shootFrames=0;lasers=[];explosions=[];_pendingMonster=null;
  currentLevelIdx=0;playerLevel=1;portal=null;transitionAlpha=0;nextPortalScore=LEVEL_LOOP_SCORE;nextBonusScore=BONUS_TRIGGER_SCORE;nextShopScore=SHOP_TRIGGER_SCORE;shopOpen=false;bonusGameBag=[];bonusGame=createBonusState();
  demoQuestionIndex=0;coveredWords=[];currentQuestion=null;demoCompleted=false;runnerAttempts=[];runnerSessionSaved=false;
  buildLevelSequence();
  levelDef=LEVELS[levelSequence[0]];
  document.getElementById('levelLbl').textContent='LVL 1';
  resetR();
  document.getElementById("qBox").classList.remove("show");
  showScreen("gameScreen");
  cancelAnimationFrame(rafId);
  syncPrincessMusic();
  loop();
}
async function endGame(){
  if (runExitInProgress) return;
  runExitInProgress = true;
  setRunnerExitButtonsDisabled(true);
  closeRunnerExitModal();
  SFX.gameover();
  stopRunnerLoopAndAudio();
  saveRunnerDiagnosticSession();
  showScreen("gameOverScreen");
  renderRunnerGameOver(await submitRunnerScore());
}
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function endDemoSuccess(){
  if (demoCompleted) return;
  demoCompleted = true;
  stopRunnerLoopAndAudio();
  saveRunnerDiagnosticSession();
  showScreen("gameOverScreen");
  renderRunnerGameOver(await submitRunnerScore());
}

// INIT
async function init(){
  const startHS = document.getElementById("startHS");
  if (startHS) startHS.textContent=`\u{1F3C6} Local Best: ${getLocalBestScore()}`;
  setGameMode("diagnostic");
  updateMuteButtonLabel();
  await loadWords();
  const btn=document.getElementById("startBtn");
  if(WORDS.length){btn.textContent="RUN!";btn.disabled=false;btn.onclick=startGame;}
  else btn.textContent="No phonics questions found";
}
if (document.getElementById("skipBtn")) document.getElementById("skipBtn").onclick=useQuestionSkip;
if (document.getElementById("shopHeartBtn")) document.getElementById("shopHeartBtn").onclick=()=>claimShopReward("heart");
if (document.getElementById("shopSkipBtn")) document.getElementById("shopSkipBtn").onclick=()=>claimShopReward("skip");
document.getElementById("playAgainBtn").onclick=startGame;
document.getElementById("saveQuitBtn").onclick=()=>openRunnerExitModal("quit");
document.getElementById("runnerStayBtn").onclick=closeRunnerExitModal;
document.getElementById("runnerSaveHomeBtn").onclick=confirmRunnerExit;
document.getElementById("diagnosticModeBtn").onclick=()=>setGameMode("diagnostic");
document.getElementById("practiceModeBtn").onclick=()=>setGameMode("practice");
document.getElementById("runnerExitModal").onclick=(e)=>{ if(e.target.id==="runnerExitModal") closeRunnerExitModal(); };
document.getElementById("startBtn").disabled=true;
init();
</script>
